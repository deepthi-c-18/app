version: '3.9'

services:
  springboot-app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: springboot-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_OPTS=-Xmx512m -Xms256m
    volumes:
      - app-logs:/app/logs
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/tasks"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Add a database service (PostgreSQL)
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: springboot-db
  #   environment:
  #     POSTGRES_DB: springbootdb
  #     POSTGRES_USER: dbuser
  #     POSTGRES_PASSWORD: dbpassword
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - db-data:/var/lib/postgresql/data
  #   networks:
  #     - app-network
  #   restart: unless-stopped

volumes:
  app-logs:
  # db-data:

networks:
  app-network:
    driver: bridge
